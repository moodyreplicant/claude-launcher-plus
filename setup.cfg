[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = .git,__pycache__,build,dist,.venv

[black]
line-length = 88
target-version = py311

[isort]
profile = black
line_length = 88

[mypy]
python_version = 3.11
strict = True
ignore_missing_imports = True
exclude = (build/|dist/|\.venv/)

[bandit]
skips = B101
exclude = /tests/,/.venv/,/build/
